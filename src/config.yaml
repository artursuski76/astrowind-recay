site:
  name: RECAY
  site: 'https://artursuski76.github.io'
  base: '/astrowind-recay'
  trailingSlash: false

  googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Default SEO metadata
metadata:
  title:
    default: RECAY – Wypożyczalnia samochodów Bielsko-Biała
    template: '%s — RECAY'
  description: 'Wynajem samochodów osobowych, dostawczych i naczep w Bielsku-Białej. Minimum formalności, konkurencyjne ceny, nowoczesna flota. Zadzwoń: +48 662 294 045'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: RECAY
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@recay_pl'
    site: '@recay_pl'
    cardType: summary_large_image

i18n:
  language: pl
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
